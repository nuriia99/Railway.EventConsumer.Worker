name: Fly Deploy

on:
  push:
    branches:
      - master    # change to main if needed
      - preproduction
      - production

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-group
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly (remote build)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ secrets.FLY_APP_NAME }}
          FLY_PREPROD_APP_NAME: ${{ secrets.FLY_PREPROD_APP_NAME }}
        run: |
          BRANCH_NAME=${GITHUB_REF##*/}
          echo "Branch: $BRANCH_NAME"
          if [ "$BRANCH_NAME" = "preproduction" ]; then
            if [ -z "$FLY_PREPROD_APP_NAME" ]; then
              echo "Error: secret FLY_PREPROD_APP_NAME is not set" >&2
              exit 1
            fi
            flyctl deploy --app "$FLY_PREPROD_APP_NAME" --remote-only
          else
            if [ -z "$FLY_APP_NAME" ]; then
              echo "Error: secret FLY_APP_NAME is not set" >&2
              exit 1
            fi
            flyctl deploy --app "$FLY_APP_NAME" --remote-only
          fi
